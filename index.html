<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="CalorieAI — Track your daily calories, macros, and meals with a beautiful food diary." />
  <meta name="theme-color" content="#43a047" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CalorieAI" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>CalorieAI — Calories Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/index.css" />
</head>

<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash__content">
      <div class="splash__logo">🥗</div>
      <div class="splash__name">CalorieAI</div>
      <div class="splash__quote" id="splash-quote"></div>
      <div class="splash__dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div id="app"></div>

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- Configuration -->
  <script src="config.js?v=1"></script>

  <!-- Firebase Config & Auth -->
  <script src="src/firebase-config.js?v=11"></script>

  <!-- Nutrition API -->
  <script src="src/nutrition-api.js?v=8"></script>

  <!-- Store -->
  <script src="src/store.js?v=8"></script>

  <!-- Components -->
  <script src="src/components/ProgressRing.js?v=8"></script>
  <script src="src/components/MacroBar.js?v=8"></script>
  <script src="src/components/MealCard.js?v=8"></script>
  <script src="src/components/NavBar.js?v=8"></script>
  <script src="src/components/NumberPicker.js?v=8"></script>
  <script src="src/components/AchievementModal.js?v=8"></script>
  <script src="src/components/WaterTracker.js?v=9"></script>
  <script src="src/components/StepsTracker.js?v=9"></script>
  <script src="src/components/BMICard.js?v=9"></script>
  <script src="src/components/StreakCounter.js?v=8"></script>
  <script src="src/components/FoodSearch.js?v=8"></script>
  <script src="src/components/CameraCapture.js?v=8"></script>
  <script src="src/components/MealReminders.js?v=8"></script>
  <script src="src/components/ExportData.js?v=8"></script>

  <!-- Pages -->
  <script src="src/pages/AuthPage.js?v=11"></script>
  <script src="src/pages/FoodDiary.js?v=8"></script>
  <script src="src/pages/Charts.js?v=8"></script>
  <script src="src/pages/Scanner.js?v=12"></script>
  <script src="src/pages/Settings.js?v=8"></script>
  <script src="src/pages/Onboarding.js?v=8"></script>

  <!-- Router -->
  <script src="src/main.js?v=11"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=16')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
